name: Company1000 remote incremental runner

on:
  push:
    branches:
      - research/company1000-crawler-20260713
    paths:
      - 'research/company1000/automation_trigger.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: company1000-research-writes
  cancel-in-progress: false

jobs:
  run-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/company1000-crawler-20260713
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: research/company1000/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Validate crawler scripts
        working-directory: research/company1000
        run: |
          python -m py_compile \
            crawl_company_jobs.py \
            crawl_company_jobs_pending.py \
            crawl_company_jobs_merged.py \
            enumerate_recruitment_navigation.py \
            enumerate_recruitment_navigation_v2.py \
            enumerate_recruitment_navigation_v3.py \
            enumerate_recruitment_navigation_v4.py \
            reclassify_navigation_detail_urls.py \
            resolve_job_detail_candidates.py \
            resolve_job_detail_candidates_safe.py \
            resolve_job_detail_candidates_v2.py \
            summarize_detail_failures.py \
            resolve_multi_position_announcements.py \
            build_import_package.py \
            ensure_unique_job_source_urls.py \
            assess_final_acceptance.py

      - name: Audit next unprocessed companies
        id: batch
        continue-on-error: true
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          mkdir -p output runtime logs deliverables
          python crawl_company_jobs_merged.py \
            --seed-file company_seed_1000.json \
            --output-dir output \
            --state-file runtime/checkpoint.json \
            --batch-size 50 \
            | tee logs/next_batch_auto.log

      - name: Reclassify strong official ATS detail URLs
        id: reclassify
        continue-on-error: true
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          python reclassify_navigation_detail_urls.py \
            --output-dir output \
            | tee logs/reclassify_navigation_detail_urls.log

      - name: Expand public recruitment navigation with bounded retry-aware classifier
        id: navigation
        continue-on-error: true
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          python enumerate_recruitment_navigation_v4.py \
            --seed-file runtime/company_seed_merged.json \
            --output-dir output \
            --state-file runtime/checkpoint.json \
            --batch-size 300 \
            --max-workers 12 \
            --max-attempts 4 \
            --max-children-per-page 60 \
            --timeout-seconds 18 \
            | tee logs/navigation_expansion.log

      - name: Resolve probable job detail candidates with bounded retries
        id: detail
        continue-on-error: true
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          python resolve_job_detail_candidates_v2.py \
            --output-dir output \
            --batch-size 120 \
            --max-workers 12 \
            --max-attempts 3 \
            | tee logs/resolve_job_details.log

      - name: Summarize detail resolution failures
        if: always()
        working-directory: research/company1000
        run: |
          python summarize_detail_failures.py \
            | tee logs/summarize_detail_failures.log

      - name: Extract roles from multi-position announcements
        id: announcement
        continue-on-error: true
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          python resolve_multi_position_announcements.py \
            --output-dir output \
            --batch-size 40 \
            --max-workers 6 \
            --max-attempts 2 \
            | tee logs/resolve_multi_position_announcements.log

      - name: Reconcile checkpoint and build deliverables
        if: always()
        working-directory: research/company1000
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          merged_path = Path('runtime/company_seed_merged.json')
          state_path = Path('runtime/checkpoint.json')
          if merged_path.exists():
              merged = json.loads(merged_path.read_text(encoding='utf-8'))
              state = json.loads(state_path.read_text(encoding='utf-8')) if state_path.exists() else {}
              companies = merged.get('companies', [])
              state['target_companies'] = 1000
              state['valid_seed_count'] = len(companies)
              state['duplicate_seed_rows_excluded'] = merged.get('duplicate_seed_rows_excluded', 0)
              state['company_id_collisions_resolved'] = merged.get('company_id_collisions_resolved', 0)
              state['merged_seed_sources'] = merged.get('source_files', [])
              state['updated_at'] = datetime.now(timezone.utc).isoformat()
              state.setdefault('policy', {})['auto_active_verified'] = False
              state['policy']['salary_inference_allowed'] = False
              state['policy']['login_captcha_or_paywall_bypass_allowed'] = False
              state['policy']['new_job_link_default_status'] = 'candidate_raw'
              state['policy']['review_pending_requires_detail_validation'] = True
              state['policy']['recruitment_navigation_requires_site_specific_resolution'] = True
              state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          python build_import_package.py | tee logs/build_import_package.log
          python ensure_unique_job_source_urls.py | tee logs/ensure_unique_job_source_urls.log
          python assess_final_acceptance.py | tee logs/assess_final_acceptance.log

      - name: Record workflow outcome
        if: always()
        working-directory: research/company1000
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          path = Path('runtime/last_workflow_manifest.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps({
              'generated_at_utc': datetime.now(timezone.utc).isoformat(),
              'runner_step_outcome': '${{ steps.batch.outcome }}',
              'runner_step_conclusion': '${{ steps.batch.conclusion }}',
              'reclassification_step_outcome': '${{ steps.reclassify.outcome }}',
              'reclassification_step_conclusion': '${{ steps.reclassify.conclusion }}',
              'navigation_step_outcome': '${{ steps.navigation.outcome }}',
              'navigation_step_conclusion': '${{ steps.navigation.conclusion }}',
              'detail_step_outcome': '${{ steps.detail.outcome }}',
              'detail_step_conclusion': '${{ steps.detail.conclusion }}',
              'announcement_step_outcome': '${{ steps.announcement.outcome }}',
              'announcement_step_conclusion': '${{ steps.announcement.conclusion }}',
              'mode': 'entry_audit_ats_reclassification_bounded_navigation_retry_detail_diagnostics_and_announcement_resolution'
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

      - name: Commit results and diagnostics to research branch
        if: always()
        run: |
          git config user.name 'company1000-automation'
          git config user.email 'company1000-automation@users.noreply.github.com'
          git add research/company1000/output \
                  research/company1000/runtime \
                  research/company1000/logs \
                  research/company1000/deliverables
          if git diff --cached --quiet; then
            echo 'No generated changes to commit'
          else
            git commit -m 'research: persist company1000 navigation and detail outputs'
            for attempt in 1 2 3; do
              if git pull --rebase origin research/company1000-crawler-20260713 && \
                 git push origin HEAD:research/company1000-crawler-20260713; then
                exit 0
              fi
              echo "Push attempt ${attempt} failed; retrying"
              sleep 5
            done
            echo 'Unable to push generated outputs after retries'
            exit 1
          fi

      - name: Fail workflow if an audit stage failed
        if: steps.batch.outcome == 'failure' || steps.reclassify.outcome == 'failure' || steps.navigation.outcome == 'failure' || steps.detail.outcome == 'failure' || steps.announcement.outcome == 'failure'
        run: exit 1
