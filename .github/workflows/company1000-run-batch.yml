name: Company1000 remote incremental runner

on:
  push:
    branches:
      - research/company1000-crawler-20260713
    paths:
      - 'research/company1000/automation_trigger.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: company1000-research-writes
  cancel-in-progress: false

jobs:
  run-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/company1000-crawler-20260713
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: research/company1000/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Validate crawler scripts
        working-directory: research/company1000
        run: |
          python -m py_compile crawl_company_jobs.py crawl_company_jobs_pending.py crawl_company_jobs_merged.py build_import_package.py assess_final_acceptance.py

      - name: Audit next unprocessed companies
        id: batch
        continue-on-error: true
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          set -o pipefail
          mkdir -p output runtime logs deliverables
          python crawl_company_jobs_merged.py \
            --seed-file company_seed_1000.json \
            --output-dir output \
            --state-file runtime/checkpoint.json \
            --batch-size 20 \
            | tee logs/next_batch_auto.log

      - name: Reconcile checkpoint and build deliverables
        if: always()
        working-directory: research/company1000
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          merged_path = Path('runtime/company_seed_merged.json')
          state_path = Path('runtime/checkpoint.json')
          if merged_path.exists():
              merged = json.loads(merged_path.read_text(encoding='utf-8'))
              state = json.loads(state_path.read_text(encoding='utf-8')) if state_path.exists() else {}
              companies = merged.get('companies', [])
              state['target_companies'] = 1000
              state['valid_seed_count'] = len(companies)
              state['duplicate_seed_rows_excluded'] = merged.get('duplicate_seed_rows_excluded', 0)
              state['company_id_collisions_resolved'] = merged.get('company_id_collisions_resolved', 0)
              state['merged_seed_sources'] = merged.get('source_files', [])
              state['updated_at'] = datetime.now(timezone.utc).isoformat()
              state.setdefault('policy', {})['auto_active_verified'] = False
              state['policy']['salary_inference_allowed'] = False
              state['policy']['login_captcha_or_paywall_bypass_allowed'] = False
              state['policy']['new_job_link_default_status'] = 'candidate_raw'
              state['policy']['review_pending_requires_detail_validation'] = True
              state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          python build_import_package.py | tee logs/build_import_package.log
          python assess_final_acceptance.py | tee logs/assess_final_acceptance.log

      - name: Record workflow outcome
        if: always()
        working-directory: research/company1000
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          path = Path('runtime/last_workflow_manifest.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps({
              'generated_at_utc': datetime.now(timezone.utc).isoformat(),
              'runner_step_outcome': '${{ steps.batch.outcome }}',
              'runner_step_conclusion': '${{ steps.batch.conclusion }}',
              'mode': 'next_unprocessed_incremental'
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

      - name: Commit results and diagnostics to research branch
        if: always()
        run: |
          git config user.name 'company1000-automation'
          git config user.email 'company1000-automation@users.noreply.github.com'
          git add research/company1000/output \
                  research/company1000/runtime \
                  research/company1000/logs \
                  research/company1000/deliverables
          if git diff --cached --quiet; then
            echo 'No generated changes to commit'
          else
            git commit -m 'research: persist next company1000 incremental audit outputs'
            for attempt in 1 2 3; do
              if git pull --rebase origin research/company1000-crawler-20260713 && \
                 git push origin HEAD:research/company1000-crawler-20260713; then
                exit 0
              fi
              echo "Push attempt ${attempt} failed; retrying"
              sleep 5
            done
            echo 'Unable to push generated outputs after retries'
            exit 1
          fi

      - name: Fail workflow if runner failed
        if: steps.batch.outcome == 'failure'
        run: exit 1
