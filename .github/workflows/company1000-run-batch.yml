name: Company1000 remote batch runner

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-batch:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'research/company1000-crawler-20260713'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/company1000-crawler-20260713
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Run deterministic batch 0007
        id: batch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mkdir -p research/company1000/logs research/company1000/runs/batch_0007
          python research/company1000/run_batch_0007.py 2>&1 \
            | tee research/company1000/logs/batch_0007_workflow.log

      - name: Record workflow outcome
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          path = Path('research/company1000/runs/batch_0007/workflow_outcome.json')
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps({
              'generated_at_utc': datetime.now(timezone.utc).isoformat(),
              'runner_step_outcome': '${{ steps.batch.outcome }}',
              'runner_step_conclusion': '${{ steps.batch.conclusion }}'
          }, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

      - name: Commit results and diagnostics to research branch
        if: always()
        shell: bash
        run: |
          git config user.name "company1000-automation"
          git config user.email "company1000-automation@users.noreply.github.com"
          git add -A research/company1000/company_seed_1000.json \
                     research/company1000/output \
                     research/company1000/runtime \
                     research/company1000/logs \
                     research/company1000/runs/batch_0007
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "research: persist company1000 batch 0007 outputs and diagnostics"
            git push origin HEAD:research/company1000-crawler-20260713
          fi

      - name: Fail workflow if runner failed
        if: steps.batch.outcome == 'failure'
        run: exit 1
