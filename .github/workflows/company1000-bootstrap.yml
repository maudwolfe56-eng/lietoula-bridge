name: Company1000 audit batch 0007

on:
  push:
    branches:
      - research/company1000-crawler-20260713
    paths:
      - .github/workflows/company1000-bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/company1000-crawler-20260713
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install crawler dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Merge batch 0007 seed delta
        working-directory: research/company1000
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          seed_path = Path('company_seed_1000.json')
          delta_path = Path('seed_delta_batch_0007.json')
          seed = json.loads(seed_path.read_text(encoding='utf-8'))
          delta = json.loads(delta_path.read_text(encoding='utf-8'))
          companies = seed.get('companies', [])
          by_id = {c['company_id']: c for c in companies if c.get('company_id')}
          order = [c['company_id'] for c in companies if c.get('company_id')]
          for company in delta.get('companies', []):
              cid = company['company_id']
              if cid not in by_id:
                  order.append(cid)
              by_id[cid] = company
          merged = [by_id[cid] for cid in order]
          seed['companies'] = merged
          seed['valid_seed_count'] = len(merged)
          seed['target_count'] = 1000
          seed['seed_status'] = 'partial_valid_seed_expanding'
          seed['generated_at'] = datetime.now(timezone.utc).isoformat()
          seed_path.write_text(json.dumps(seed, ensure_ascii=False, separators=(',', ':')), encoding='utf-8')
          assert len(merged) >= 46, len(merged)
          print({'merged_seed_count': len(merged)})
          PY

      - name: Validate crawler and capture offsets
        working-directory: research/company1000
        run: |
          python -m py_compile crawl_company_jobs.py
          mkdir -p output runtime logs runs/batch_0007
          wc -l output/coverage_auto.jsonl 2>/dev/null | awk '{print $1}' > runs/batch_0007/coverage_before.txt || echo 0 > runs/batch_0007/coverage_before.txt
          wc -l output/failures_auto.jsonl 2>/dev/null | awk '{print $1}' > runs/batch_0007/failures_before.txt || echo 0 > runs/batch_0007/failures_before.txt
          wc -l output/job_link_candidates_auto.jsonl 2>/dev/null | awk '{print $1}' > runs/batch_0007/links_before.txt || echo 0 > runs/batch_0007/links_before.txt

      - name: Audit seed entries 37-46 conservatively
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python crawl_company_jobs.py \
            --seed-file company_seed_1000.json \
            --output-dir output \
            --state-file runtime/checkpoint.json \
            --start-index 36 \
            --batch-size 10 \
            | tee logs/batch_0007_auto.log

      - name: Materialize auditable batch snapshots and update checkpoint
        working-directory: research/company1000
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          run = Path('runs/batch_0007')
          output = Path('output')
          mappings = [
              ('coverage_auto.jsonl', 'coverage_before.txt', 'coverage_batch_0007.jsonl'),
              ('failures_auto.jsonl', 'failures_before.txt', 'failures_batch_0007.jsonl'),
              ('job_link_candidates_auto.jsonl', 'links_before.txt', 'job_link_candidates_batch_0007.jsonl'),
          ]
          counts = {}
          for src_name, before_name, dst_name in mappings:
              src = output / src_name
              before = int((run / before_name).read_text().strip() or '0')
              lines = src.read_text(encoding='utf-8').splitlines() if src.exists() else []
              new_lines = lines[before:]
              (run / dst_name).write_text(('\n'.join(new_lines) + ('\n' if new_lines else '')), encoding='utf-8')
              counts[dst_name] = len(new_lines)

          coverage_rows = []
          coverage_path = run / 'coverage_batch_0007.jsonl'
          for line in coverage_path.read_text(encoding='utf-8').splitlines() if coverage_path.exists() else []:
              if line.strip():
                  coverage_rows.append(json.loads(line))
          status_counts = {}
          for row in coverage_rows:
              status = row.get('enumeration_status', 'unknown')
              status_counts[status] = status_counts.get(status, 0) + 1

          manifest = {
              'batch_id': 'batch_0007',
              'generated_at_utc': datetime.now(timezone.utc).isoformat(),
              'seed_start_index': 36,
              'seed_end_index_exclusive': 46,
              'companies_reviewed': len(coverage_rows),
              'status_counts': status_counts,
              'new_output_counts': counts,
              'policy': {
                  'auto_active_verified': False,
                  'salary_inference_allowed': False,
                  'login_captcha_or_paywall_bypass_allowed': False,
              },
              'final_acceptance_met': False,
          }
          (run / 'manifest.json').write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')

          state_path = Path('runtime/checkpoint.json')
          state = json.loads(state_path.read_text(encoding='utf-8'))
          state['valid_seed_count'] = 46
          state['next_batch_start_index'] = 46
          state.setdefault('batch_progress', {})['batch_0007'] = {
              'companies_reviewed': len(coverage_rows),
              'records': 0,
              'status': 'partial',
              'seed_start_index': 36,
              'seed_end_index_exclusive': 46,
              'enumeration_status_counts': status_counts,
              'job_link_candidates_discovered': counts.get('job_link_candidates_batch_0007.jsonl', 0),
              'final_acceptance_met': 0,
              'run_path': 'runs/batch_0007',
          }
          state['updated_at'] = datetime.now(timezone.utc).isoformat()
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2), encoding='utf-8')
          print(json.dumps(manifest, ensure_ascii=False))
          PY

      - name: Commit auditable outputs
        run: |
          git config user.name "company1000-automation"
          git config user.email "company1000-automation@users.noreply.github.com"
          git add research/company1000/company_seed_1000.json \
                  research/company1000/output \
                  research/company1000/runtime \
                  research/company1000/logs \
                  research/company1000/runs/batch_0007
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "research: audit company1000 batch 0007 entries 37-46"
            git push origin HEAD:research/company1000-crawler-20260713
          fi
