name: Company1000 audit batch

on:
  push:
    branches:
      - research/company1000-crawler-20260713
    paths:
      - .github/workflows/company1000-bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/company1000-crawler-20260713
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: research/company1000/requirements.txt

      - name: Install crawler dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Validate seed and crawler
        working-directory: research/company1000
        run: |
          python -m py_compile crawl_company_jobs.py
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('company_seed_1000.json').read_text(encoding='utf-8'))
          companies = data['companies']
          assert companies and all(c.get('company_id') and c.get('company_name') for c in companies)
          print({'valid_seed_count': len(companies), 'target_count': data.get('target_count')})
          PY

      - name: Audit first valid batch conservatively
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          mkdir -p output runtime logs
          python crawl_company_jobs.py \
            --seed-file company_seed_1000.json \
            --output-dir output \
            --state-file runtime/checkpoint.json \
            --start-index 0 \
            --batch-size 10 \
            | tee logs/batch_0001_auto.log

      - name: Write run manifest
        working-directory: research/company1000
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          manifest = {
              'generated_at_utc': datetime.now(timezone.utc).isoformat(),
              'run_type': 'public_career_entry_audit',
              'policy': {
                  'auto_active_verified': False,
                  'salary_inference_allowed': False,
                  'login_captcha_or_paywall_bypass_allowed': False,
              },
              'outputs': [
                  p.as_posix() for p in sorted(Path('output').glob('*')) if p.is_file()
              ],
          }
          Path('runtime/last_workflow_manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          PY

      - name: Commit auditable outputs
        run: |
          git config user.name "company1000-automation"
          git config user.email "company1000-automation@users.noreply.github.com"
          git add research/company1000/output research/company1000/runtime research/company1000/logs
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "research: audit first 10 official career entries"
            git push origin HEAD:research/company1000-crawler-20260713
          fi
