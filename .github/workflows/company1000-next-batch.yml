name: Company1000 next entry audit

on:
  push:
    branches:
      - research/company1000-crawler-20260713
    paths:
      - .github/workflows/company1000-next-batch.yml
      - research/company1000/next_batch.trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: company1000-next-entry-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/company1000-crawler-20260713
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: research/company1000/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml python-dateutil

      - name: Audit next unprocessed seed entries
        working-directory: research/company1000
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          mkdir -p output runtime logs
          python crawl_company_jobs_merged.py \
            --seed-file company_seed_1000.json \
            --output-dir output \
            --state-file runtime/checkpoint.json \
            --batch-size 10 \
            | tee logs/next_batch_auto.log

      - name: Commit auditable outputs
        run: |
          git config user.name 'company1000-automation'
          git config user.email 'company1000-automation@users.noreply.github.com'
          git add research/company1000/output research/company1000/runtime research/company1000/logs
          if git diff --cached --quiet; then
            echo 'No generated changes to commit'
          else
            git commit -m 'research: audit next official career entries'
            git push origin HEAD:research/company1000-crawler-20260713
          fi
